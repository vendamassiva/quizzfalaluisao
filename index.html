<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quiz — Luisão</title>
  <meta name="description" content="Descubra como crescer seus seguidores e gerar clientes com o novo formato de conteúdo." />
  <meta property="og:title" content="Quiz — Luisão" />
  <meta property="og:description" content="Responda 5 perguntas e veja se posso te ajudar a crescer nas redes sociais." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <main class="container" role="main">
    <div class="card" id="quizCard">

      <header class="card-header">
        <div class="logo-row">
          <span class="logo-dot"></span>
          <span class="logo-text">Pré-qualificação</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-meta">
            <span class="step-label" id="stepLabel">Pergunta 1 de 5</span>
            <span class="step-pct" id="stepPct">0%</span>
          </div>
          <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso do quiz">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </header>

      <section class="question-area" id="questionArea" aria-live="polite"></section>

    </div>
  </main>

  <script src="quiz.js"></script>
</body>
</html>
